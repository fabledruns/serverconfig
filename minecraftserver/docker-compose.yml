services:
  mc:
    image: itzg/minecraft-server
    container_name: minecraft
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: "PURPUR"
      VERSION: "1.21.11"
      MEMORY: "2G"
      ONLINE_MODE: "true"
    ports:
      - "25565:25565"
    volumes:
      - ./data:/data